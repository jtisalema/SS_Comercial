<div class="content-wrapper"
    style="background-image: url('assets/images/fondos/plataforma_fondo2.png');background-repeat: no-repeat;height: 100%;background-size: cover;">
    <br>
    <section class="content">
        <div class="container-fluid">
            <div class="row">
                <div class="col-12">
                    <div class="card card-primary card-outline">
                        <div class="card-header">
                            <h3 class="card-title" style="padding-top: 5px;">
                                <i class="fas fa-user-alt mr-2"></i>
                                Comunicados
                            </h3>
                            <button type="button" class="btn btn-success btn-sm float-right"
                                onclick="window.open('/noticias', '_blank')">
                                <i class="fas fa-eye mr-2"></i> Ver
                            </button>
                            <button type="button" class="btn btn-primary btn-sm float-right" data-toggle="modal"
                                (click)="AbrirModal(false)">
                                <i class="fas fa-plus-circle mr-2"></i> Agregar
                            </button>
                            <button #btnActualizaCustodio type="button" hidden data-toggle="modal">
                            </button>
                        </div>
                        <div class="card-body">
                            <table #dataTableComunicados class="table table-bordered table-striped" style="width: 100%;">
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <div class="modal fade" id="comunicadoModal">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title">{{ isEditing ? 'Actualizar Comunicado' : 'Agregar Comunicado' }}</h4>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span >&times;</span>
                    </button>
                </div>
                <form [formGroup]="comunicadoForm" (ngSubmit)="guardarComunicado()">
                    <div class="modal-body">
                        <div class="card-body row">
                            <div class="col-lg-12 form-group">
                                <div class="row align-items-center">
                                    <label for="tituloComunicado"
                                        class="col-lg-3 col-md-4 col-sm-12 col-form-label">Título:</label>
                                    <div class="col-lg-9 col-md-8 col-sm-12">
                                        <input type="text"
                                            [ngClass]="{ 'is-invalid': comunicadoForm.get('tituloComunicado')!.errors && comunicadoForm.get('tituloComunicado')!.touched }"
                                            class="form-control" placeholder="Nombre de la marca"
                                            formControlName="tituloComunicado">
                                        <div class="invalid-feedback"
                                            *ngIf="comunicadoForm.get('tituloComunicado')!.errors && comunicadoForm.get('tituloComunicado')!.touched">
                                            El Título del comunicado es obligatorio
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-12 form-group">
                                <div class="row align-items-center">
                                    <label for="descripcionComunicado"
                                        class="col-lg-3 col-md-4 col-sm-12 col-form-label">Descripción:</label>
                                    <div class="col-lg-9 col-md-8 col-sm-12">
                                        <input type="text"
                                            [ngClass]="{ 'is-invalid': comunicadoForm.get('descripcionComunicado')!.errors && comunicadoForm.get('descripcionComunicado')!.touched }"
                                            class="form-control" placeholder="Nombre de la marca"
                                            formControlName="descripcionComunicado">
                                        <div class="invalid-feedback"
                                            *ngIf="comunicadoForm.get('descripcionComunicado')!.errors && comunicadoForm.get('descripcionComunicado')!.touched">
                                            La descripción del comunicado es obligatorio
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-12 form-group">
                                <div class="row align-items-center">
                                    <label for="mensajeComunicado"
                                        class="col-lg-3 col-md-4 col-sm-12 col-form-label">Mensaje:</label>
                                    <div class="col-lg-9 col-md-8 col-sm-12">
                                        <input type="text"
                                            [ngClass]="{ 'is-invalid': comunicadoForm.get('mensajeComunicado')!.errors && comunicadoForm.get('mensajeComunicado')!.touched }"
                                            class="form-control" placeholder="Nombre de la marca"
                                            formControlName="mensajeComunicado">
                                        <div class="invalid-feedback"
                                            *ngIf="comunicadoForm.get('mensajeComunicado')!.errors && comunicadoForm.get('mensajeComunicado')!.touched">
                                            El mensaje del comunicado es obligatorio
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-12 form-group">
                                <div class="row align-items-start">
                                    <label for="tipoComunicado"
                                        class="col-lg-3 col-md-4 col-sm-12 col-form-label">Tipo:</label>

                                    <div class="col-lg-9 col-md-8 col-sm-12">
                                        <select id="tipoComunicado" class="custom-select color-black"
                                            style="height: 45px;" formControlName="tipoComunicado" [ngClass]="{
                'is-invalid': comunicadoForm.get('tipoComunicado')!.errors && comunicadoForm.get('tipoComunicado')!.touched
              }">
                                            <option [ngValue]="null" disabled selected>Seleccionar...</option>
                                            <option [ngValue]="1">Pantalla Completa</option>
                                            <option [ngValue]="2">Media Pantalla</option>
                                            <option [ngValue]="3">Gráfico</option>
                                        </select>

                                        <div class="invalid-feedback d-block"
                                            *ngIf="comunicadoForm.get('tipoComunicado')!.errors && comunicadoForm.get('tipoComunicado')!.touched">
                                            El tipo es obligatorio
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-12 form-group">
                                <div class="row align-items-center">
                                    <label for="imagenComunicado"
                                        class="col-lg-3 col-md-4 col-sm-12 col-form-label">Imagen:</label>
                                    <div class="col-lg-9 col-md-8 col-sm-12">
                                        <div class="upload-box" [ngClass]="{
                                    'is-invalid': comunicadoForm.get('imagenComunicado')!.errors && comunicadoForm.get('imagenComunicado')!.touched,
                                    'drag-over': estaArrastrando
                                }" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)"
                                            (drop)="onDrop($event)">
                                            <label for="imagenComunicado">
                                                <span *ngIf="!nombreImagen">📁 Ingrese una imagen </span>
                                                <span *ngIf="nombreImagen">✅ {{ nombreImagen }}</span>
                                            </label>
                                            <input type="file" id="imagenComunicado" accept="image/*"
                                                (change)="onFileSelected($event)">
                                        </div>

                                        <div class="invalid-feedback"
                                            *ngIf="comunicadoForm.get('imagenComunicado')!.errors && comunicadoForm.get('imagenComunicado')!.touched">
                                            La imagen es obligatoria
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-12 form-group">
                                <div class="row align-items-start">
                                    <label for="colorComunicado"
                                        class="col-lg-3 col-md-4 col-sm-12 col-form-label">Color:</label>

                                    <div class="col-lg-9 col-md-8 col-sm-12">
                                        <div class="d-flex align-items-center mb-2">
                                            <input type="color" id="colorComunicado" class="form-control-color mr-3"
                                                [value]="comunicadoForm.get('colorComunicado')?.value || '#000000'"
                                                (input)="onColorChange($event)"
                                                style="width: 50px; height: 45px; border: none; padding: 0;">

                                            <input type="text" class="form-control" placeholder="#000000"
                                                formControlName="colorComunicado" [ngClass]="{
                 'is-invalid': comunicadoForm.get('colorComunicado')!.errors && comunicadoForm.get('colorComunicado')!.touched
               }">
                                        </div>

                                        <div class="invalid-feedback d-block"
                                            *ngIf="comunicadoForm.get('colorComunicado')!.errors && comunicadoForm.get('colorComunicado')!.touched">
                                            El color es obligatorio
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                    <div class="modal-footer text-end">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save mr-2"></i>
                            {{ isEditing ? 'Actualizar' : 'Guardar' }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
